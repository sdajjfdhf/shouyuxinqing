<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="50%" style="stop-color:#B0E0E6"/>
      <stop offset="100%" style="stop-color:#E0F7FA"/>
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90"/>
      <stop offset="100%" style="stop-color:#228B22"/>
    </linearGradient>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E8B57"/>
      <stop offset="100%" style="stop-color:#3CB371"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="200" fill="url(#skyGradient)"/>
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD700" opacity="0.9"/>
  <circle cx="350" cy="50" r="40" fill="#FFD700" opacity="0.3"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="60" rx="40" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="100" cy="55" rx="35" ry="18" fill="white" opacity="0.8"/>
  <ellipse cx="60" cy="65" rx="30" ry="15" fill="white" opacity="0.8"/>
  <ellipse cx="250" cy="80" rx="45" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="275" cy="75" rx="38" ry="19" fill="white" opacity="0.7"/>
  <!-- Grass -->
  <rect x="0" y="200" width="400" height="100" fill="url(#grassGradient)"/>
  <!-- Trees Background -->
  <polygon points="30,200 50,100 70,200" fill="#228B22" opacity="0.6"/>
  <polygon points="350,200 370,110 390,200" fill="#228B22" opacity="0.6"/>
  <!-- Trees Foreground -->
  <polygon points="80,200 110,60 140,200" fill="url(#treeGradient)"/>
  <rect x="100" y="180" width="20" height="30" fill="#8B4513"/>
  <polygon points="260,200 290,50 320,200" fill="url(#treeGradient)"/>
  <rect x="280" y="180" width="20" height="30" fill="#8B4513"/>
  <!-- Flowers -->
  <circle cx="150" cy="220" r="5" fill="#FF69B4"/>
  <circle cx="150" cy="220" r="2" fill="#FFD700"/>
  <circle cx="200" cy="240" r="5" fill="#FF6347"/>
  <circle cx="200" cy="240" r="2" fill="#FFD700"/>
  <circle cx="300" cy="230" r="5" fill="#9370DB"/>
  <circle cx="300" cy="230" r="2" fill="#FFD700"/>
  <circle cx="120" cy="250" r="5" fill="#FFB6C1"/>
  <circle cx="120" cy="250" r="2" fill="#FFD700"/>
  <!-- Butterflies -->
  <g transform="translate(180, 150)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#FF69B4" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#FF69B4" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="10" stroke="#4A4A4A" stroke-width="1"/>
  </g>
  <g transform="translate(320, 120)">
    <ellipse cx="0" cy="0" rx="7" ry="4" fill="#87CEEB" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="4" ry="7" fill="#87CEEB" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="8" stroke="#4A4A4A" stroke-width="1"/>
  </g>
</svg>