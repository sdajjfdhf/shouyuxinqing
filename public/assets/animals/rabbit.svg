<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rabbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E1"/>
      <stop offset="100%" style="stop-color:#FFB6C1"/>
    </linearGradient>
    <linearGradient id="earGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#FF69B4"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="100" cy="150" rx="50" ry="35" fill="url(#rabbitGradient)"/>
  <!-- Head -->
  <circle cx="100" cy="100" r="40" fill="url(#rabbitGradient)"/>
  <!-- Left Ear -->
  <ellipse cx="75" cy="50" rx="12" ry="35" fill="url(#earGradient)" transform="rotate(-15 75 50)"/>
  <ellipse cx="75" cy="50" rx="6" ry="25" fill="#FFE4E1" transform="rotate(-15 75 50)"/>
  <!-- Right Ear -->
  <ellipse cx="125" cy="50" rx="12" ry="35" fill="url(#earGradient)" transform="rotate(15 125 50)"/>
  <ellipse cx="125" cy="50" rx="6" ry="25" fill="#FFE4E1" transform="rotate(15 125 50)"/>
  <!-- Eyes -->
  <circle cx="85" cy="95" r="8" fill="#4A4A4A"/>
  <circle cx="115" cy="95" r="8" fill="#4A4A4A"/>
  <circle cx="87" cy="93" r="3" fill="white"/>
  <circle cx="117" cy="93" r="3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="110" rx="6" ry="4" fill="#FF69B4"/>
  <!-- Mouth -->
  <path d="M 95 115 Q 100 122 105 115" stroke="#4A4A4A" stroke-width="2" fill="none"/>
  <!-- Cheeks -->
  <circle cx="70" cy="105" r="8" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="130" cy="105" r="8" fill="#FFB6C1" opacity="0.5"/>
  <!-- Whiskers -->
  <line x1="60" y1="108" x2="85" y2="110" stroke="#4A4A4A" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="115" x2="85" y2="113" stroke="#4A4A4A" stroke-width="1.5" opacity="0.4"/>
  <line x1="115" y1="110" x2="140" y2="108" stroke="#4A4A4A" stroke-width="1.5" opacity="0.4"/>
  <line x1="115" y1="113" x2="140" y2="115" stroke="#4A4A4A" stroke-width="1.5" opacity="0.4"/>
</svg>