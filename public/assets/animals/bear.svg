<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bearBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#654321"/>
    </linearGradient>
    <linearGradient id="bearFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A0522D"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <linearGradient id="bearLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="100" cy="155" rx="50" ry="35" fill="url(#bearBody)"/>
  <!-- Head -->
  <circle cx="100" cy="95" r="42" fill="url(#bearFace)"/>
  <!-- Ears -->
  <circle cx="58" cy="65" r="18" fill="url(#bearBody)"/>
  <circle cx="58" cy="65" r="10" fill="url(#bearLight)"/>
  <circle cx="142" cy="65" r="18" fill="url(#bearBody)"/>
  <circle cx="142" cy="65" r="10" fill="url(#bearLight)"/>
  <!-- Face Patch -->
  <ellipse cx="100" cy="115" rx="28" ry="22" fill="url(#bearLight)"/>
  <!-- Eyes -->
  <circle cx="82" cy="90" r="9" fill="#2C2C2C"/>
  <circle cx="118" cy="90" r="9" fill="#2C2C2C"/>
  <circle cx="84" cy="87" r="4" fill="white"/>
  <circle cx="120" cy="87" r="4" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="108" rx="10" ry="8" fill="#2C2C2C"/>
  <ellipse cx="100" cy="106" rx="4" ry="3" fill="#4A4A4A"/>
  <!-- Mouth -->
  <path d="M 90 118 Q 100 128 110 118" stroke="#4A4A4A" stroke-width="2.5" fill="none"/>
  <!-- Cheeks -->
  <circle cx="62" cy="105" r="9" fill="#D2691E" opacity="0.4"/>
  <circle cx="138" cy="105" r="9" fill="#D2691E" opacity="0.4"/>
</svg>