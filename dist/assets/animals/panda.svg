<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pandaBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    <linearGradient id="pandaBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2C2C"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="100" cy="155" rx="48" ry="32" fill="url(#pandaBody)"/>
  <!-- Head -->
  <circle cx="100" cy="95" r="40" fill="url(#pandaBody)"/>
  <!-- Ears -->
  <circle cx="60" cy="60" r="18" fill="url(#pandaBlack)"/>
  <circle cx="140" cy="60" r="18" fill="url(#pandaBlack)"/>
  <!-- Eye Patches -->
  <ellipse cx="80" cy="88" rx="18" ry="14" fill="url(#pandaBlack)" transform="rotate(-10 80 88)"/>
  <ellipse cx="120" cy="88" rx="18" ry="14" fill="url(#pandaBlack)" transform="rotate(10 120 88)"/>
  <!-- Eyes -->
  <circle cx="82" cy="88" r="8" fill="white"/>
  <circle cx="118" cy="88" r="8" fill="white"/>
  <circle cx="84" cy="86" r="5" fill="#2C2C2C"/>
  <circle cx="120" cy="86" r="5" fill="#2C2C2C"/>
  <circle cx="86" cy="84" r="2" fill="white"/>
  <circle cx="122" cy="84" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="108" rx="8" ry="6" fill="url(#pandaBlack)"/>
  <!-- Mouth -->
  <path d="M 90 116 Q 100 124 110 116" stroke="#2C2C2C" stroke-width="2" fill="none"/>
  <!-- Cheeks -->
  <circle cx="62" cy="100" r="8" fill="#FFB6C1" opacity="0.4"/>
  <circle cx="138" cy="100" r="8" fill="#FFB6C1" opacity="0.4"/>
  <!-- Cute blush -->
  <ellipse cx="65" cy="105" rx="10" ry="6" fill="#FFB6C1" opacity="0.3"/>
  <ellipse cx="135" cy="105" rx="10" ry="6" fill="#FFB6C1" opacity="0.3"/>
</svg>