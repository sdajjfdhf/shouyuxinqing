<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400">
  <defs>
    <linearGradient id="lakeSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="40%" style="stop-color:#B0E0E6"/>
      <stop offset="80%" style="stop-color:#E0F4FF"/>
      <stop offset="100%" style="stop-color:#F0F8FF"/>
    </linearGradient>
    <linearGradient id="lakeWater" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF"/>
      <stop offset="30%" style="stop-color:#4169E1"/>
      <stop offset="70%" style="stop-color:#5DADE2"/>
      <stop offset="100%" style="stop-color:#87CEEB"/>
    </linearGradient>
    <linearGradient id="mountains" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5F9EA0"/>
      <stop offset="100%" style="stop-color:#2F4F4F"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="waterBlur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="960" height="400" fill="url(#lakeSky)"/>
  
  <!-- Sun -->
  <circle cx="750" cy="60" r="40" fill="#FFD700"/>
  <circle cx="750" cy="60" r="55" fill="#FFA500" opacity="0.4"/>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="120" cy="80" rx="60" ry="25" fill="white" filter="url(#blur)"/>
    <ellipse cx="170" cy="75" rx="50" ry="20" fill="white" filter="url(#blur)"/>
    <ellipse cx="210" cy="80" rx="40" ry="18" fill="white" filter="url(#blur)"/>
    <ellipse cx="400" cy="100" rx="50" ry="20" fill="white" filter="url(#blur)"/>
    <ellipse cx="440" cy="95" rx="40" ry="16" fill="white" filter="url(#blur)"/>
  </g>
  
  <!-- Distant mountains -->
  <path d="M0 180 Q100 100 200 140 Q300 80 400 130 Q500 90 600 140 Q700 85 800 135 Q900 95 960 150 L960 260 L0 260 Z" fill="url(#mountains)" opacity="0.6"/>
  
  <!-- Mid mountains -->
  <path d="M0 200 Q80 150 150 180 Q250 130 350 170 Q450 140 550 180 Q650 135 750 175 Q850 145 960 190 L960 260 L0 260 Z" fill="#4A7C7C" opacity="0.7"/>
  
  <!-- Lake water -->
  <path d="M0 260 Q200 240 400 250 Q600 245 800 255 Q900 250 960 260 L960 400 L0 400 Z" fill="url(#lakeWater)"/>
  
  <!-- Water ripples -->
  <g opacity="0.3">
    <ellipse cx="200" cy="320" rx="40" ry="8" fill="white" filter="url(#waterBlur)"/>
    <ellipse cx="400" cy="300" rx="50" ry="10" fill="white" filter="url(#waterBlur)"/>
    <ellipse cx="600" cy="330" rx="35" ry="7" fill="white" filter="url(#waterBlur)"/>
    <ellipse cx="800" cy="310" rx="45" ry="9" fill="white" filter="url(#waterBlur)"/>
  </g>
  
  <!-- Reflection of mountains in water -->
  <g opacity="0.2">
    <path d="M0 260 Q80 310 150 280 Q250 330 350 290 Q450 320 550 280 Q650 325 750 285 Q850 315 960 270 L960 350 L0 350 Z" fill="#3A6B6B"/>
  </g>
  
  <!-- Trees on far shore -->
  <g>
    <!-- Pine trees -->
    <path d="M100 260 L110 200 L120 260 Z" fill="#228B22"/>
    <path d="M105 260 L110 210 L115 260 Z" fill="#2E8B57"/>
    <rect x="108" y="260" width="4" height="20" fill="#8B4513"/>
    
    <path d="M250 260 L265 190 L280 260 Z" fill="#228B22"/>
    <path d="M260 260 L265 200 L270 260 Z" fill="#2E8B57"/>
    <rect x="263" y="260" width="4" height="20" fill="#8B4513"/>
    
    <path d="M400 260 L415 185 L430 260 Z" fill="#228B22"/>
    <path d="M410 260 L415 195 L420 260 Z" fill="#2E8B57"/>
    <rect x="413" y="260" width="4" height="20" fill="#8B4513"/>
    
    <path d="M550 260 L565 195 L580 260 Z" fill="#228B22"/>
    <path d="M560 260 L565 205 L570 260 Z" fill="#2E8B57"/>
    <rect x="563" y="260" width="4" height="20" fill="#8B4513"/>
    
    <path d="M700 260 L715 180 L730 260 Z" fill="#228B22"/>
    <path d="M710 260 L715 190 L720 260 Z" fill="#2E8B57"/>
    <rect x="713" y="260" width="4" height="20" fill="#8B4513"/>
    
    <path d="M850 260 L865 200 L880 260 Z" fill="#228B22"/>
    <path d="M860 260 L865 210 L870 260 Z" fill="#2E8B57"/>
    <rect x="863" y="260" width="4" height="20" fill="#8B4513"/>
  </g>
  
  <!-- Grass on near shore -->
  <g opacity="0.8">
    <path d="M0 350 Q5 340 0 330" stroke="#228B22" stroke-width="3" fill="none"/>
    <path d="M10 350 Q15 335 10 325" stroke="#32CD32" stroke-width="2" fill="none"/>
    <path d="M20 350 Q25 342 20 332" stroke="#228B22" stroke-width="3" fill="none"/>
    <path d="M30 350 Q35 338 30 328" stroke="#32CD32" stroke-width="2" fill="none"/>
    
    <path d="M100 350 Q105 340 100 330" stroke="#228B22" stroke-width="3" fill="none"/>
    <path d="M110 350 Q115 335 110 325" stroke="#32CD32" stroke-width="2" fill="none"/>
    <path d="M120 350 Q125 342 120 332" stroke="#228B22" stroke-width="3" fill="none"/>
    
    <path d="M200 350 Q205 340 200 330" stroke="#228B22" stroke-width="3" fill="none"/>
    <path d="M210 350 Q215 335 210 325" stroke="#32CD32" stroke-width="2" fill="none"/>
    
    <path d="M300 350 Q305 340 300 330" stroke="#228B22" stroke-width="3" fill="none"/>
    <path d="M310 350 Q315 335 310 325" stroke="#32CD32" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Flowers on shore -->
  <g>
    <circle cx="50" cy="345" r="5" fill="#FF69B4"/>
    <circle cx="50" cy="345" r="3" fill="#FFB6C1"/>
    
    <circle cx="150" cy="342" r="5" fill="#FFD700"/>
    <circle cx="150" cy="342" r="3" fill="#FFEC8B"/>
    
    <circle cx="250" cy="345" r="5" fill="#FF69B4"/>
    <circle cx="250" cy="345" r="3" fill="#FFB6C1"/>
    
    <circle cx="350" cy="342" r="5" fill="#00CED1"/>
    <circle cx="350" cy="342" r="3" fill="#E0FFFF"/>
  </g>
  
  <!-- Duck on water -->
  <ellipse cx="500" cy="300" rx="20" ry="12" fill="#8B4513"/>
  <ellipse cx="520" cy="300" rx="8" ry="6" fill="#8B4513"/>
  <circle cx="525" cy="298" r="4" fill="#000"/>
  
  <!-- Dragonfly -->
  <ellipse cx="300" cy="280" rx="12" ry="2" fill="#20B2AA" transform="rotate(45 300 280)"/>
  <path d="M294 280 L285 270 M294 280 L285 290" stroke="#20B2AA" stroke-width="2"/>
  <path d="M306 280 L315 270 M306 280 L315 290" stroke="#20B2AA" stroke-width="2"/>
  
  <!-- Butterfly -->
  <ellipse cx="750" cy="290" rx="15" ry="8" fill="#FFB6C1" opacity="0.9"/>
  <ellipse cx="750" cy="290" rx="15" ry="8" fill="#FFB6C1" opacity="0.9" transform="rotate(60 750 290)"/>
  <ellipse cx="750" cy="290" rx="15" ry="8" fill="#FFB6C1" opacity="0.9" transform="rotate(-60 750 290)"/>
  <path d="M742 290 L758 290" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Bird flying -->
  <path d="M180 120 Q190 110 200 120 Q190 115 180 120" stroke="#5F5F5F" stroke-width="2" fill="none"/>
</svg>